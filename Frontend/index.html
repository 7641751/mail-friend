<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MailFriend</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 左侧会话列表 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="logoGrad" x1="0" y1="0" x2="38" y2="38" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#EB7B3F"/>
                                <stop offset="1" stop-color="#F59B6B"/>
                            </linearGradient>
                        </defs>
                        <rect x="3" y="8" width="32" height="22" rx="4" fill="url(#logoGrad)"/>
                        <path d="M4 12L19 23L34 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="19" cy="19" r="7" fill="white" opacity="0.25"/>
                    </svg>
                    <span class="logo-text">MailFriend</span>
                </div>
                <button class="new-session-btn" onclick="createSession()">
                    <span style="margin-right:6px">+</span> 新建会话
                </button>
            </div>
            <div class="session-list" id="sessionList"></div>
        </div>

        <!-- 右侧对话界面 -->
        <div class="chat-area">
            <div class="chat-header">
                <span class="status-dot"></span>
                <h3 id="chatTitle">选择一个会话开始聊天</h3>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="empty-state" id="emptyState">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
                    </svg>
                    <p>选择会话或创建新会话，开始使用 MailFriend</p>
                </div>
            </div>
            <div class="chat-input-area">
                <textarea class="chat-input" id="messageInput" placeholder="输入消息..." rows="1" disabled></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- HITL 弹窗 -->
    <div class="modal-overlay" id="hitlModal">
        <div class="modal">
            <div class="modal-header">
                <h3>
                    <svg class="modal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                    确认操作
                </h3>
                <button class="modal-close" onclick="closeHitlModal()">&times;</button>
            </div>
            <div class="modal-body" id="hitlModalBody"></div>
            <div class="modal-footer" id="hitlModalFooter">
                <button class="modal-btn cancel" onclick="closeHitlModal()">取消</button>
                <button class="modal-btn edit" onclick="showEditMode()">Edit</button>
                <button class="modal-btn reject" onclick="rejectInterrupt()">Reject</button>
                <button class="modal-btn approve" onclick="approveInterrupt()">Approve</button>
            </div>
        </div>
    </div>

    <!-- Reject 原因弹窗 -->
    <div class="modal-overlay" id="rejectModal">
        <div class="modal" style="width: 440px;">
            <div class="modal-header">
                <h3>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #E05555;">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="15" y1="9" x2="9" y2="15"/>
                        <line x1="9" y1="9" x2="15" y2="15"/>
                    </svg>
                    拒绝操作
                </h3>
                <button class="modal-close" onclick="closeRejectModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="param-group">
                    <label class="param-label">拒绝原因（可选）</label>
                    <textarea class="edit-input" id="rejectReasonInput"
                              placeholder="输入拒绝原因，帮助 AI 改进回复…"
                              style="min-height: 80px; width: 100%;"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel" onclick="closeRejectModal()">取消</button>
                <button class="modal-btn reject" onclick="confirmReject()">确认拒绝</button>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
